<!DOCTYPE html>
<html lang="vi">
	<head>
		<title>Thiết kế form đăng ký </title>
		<meta charset = "utf-8">
		<link rel="stylesheet" href="../css/stylesheet3.css">
	</head>
	<body>
		<div class ="container">
			<form id = "frmDangKy">
				<h2 id="title">Đăng Ký Tài Tham Gia Câu Lạc Bộ Game</h2>
					<div class = "form-group">
						<label for = "txtHoTen">Họ và Tên:</label>
						<input class ="form-control" type ="text" id ="txtHoTen" name ="txtHoTen">
					</div>
					<div class = "form-group">
						<label for = "txtLop">Mã Lớp:</label>
						<input class ="form-control" type ="text" id ="txtLop" name ="txtLop">
					</div>
					<div class = "form-group">
						<label for = "txtmssv">MSSV:</label>
						<input class ="form-control" type ="text" id ="txtmssv" name ="txtmssv">
					</div>
					<div class = "form-group">
						<label for = "txtTuoi">Tuổi:</label>
						<input class ="form-control" type ="text" id ="txtTuoi" name ="txtTuoi">
					</div>
					<div class = "form-group">
						<label for = "txtNgaySinh">Ngày Sinh:</label>
						<input class ="form-control" type ="date" id ="txtNgaySinh" name ="txtNgaySinh">
					</div>
					<div class = "form-group">
						<label for = "txtQueQuan">Quê Quán:</label>
						<input class ="form-control" type ="text" id ="txtQueQuan" name ="txtQueQuan">
					</div>
					<div class = "form-group">
						<label for = "txtTruong">Trường\Đơn Vị:</label>
						<input class ="form-control" type ="text" id ="txtTruong" name ="txtTruong">
					</div>
					<div class = "form-group">
						<label for = "txtEmail">Email:</label>
						<input class ="form-control" type ="text" id ="txtEmail" name ="txtEmail">
					</div>
					<div class = "form-group">
						<label for = "txtSoDT">Số Điện Thoại:</label>
						<input class ="form-control" type ="text" id ="txtSoDT" name ="txtSoDT">
					</div>
					<div class = "form-group">
						<label for = "txtGame">Game Đang Chơi:</label>
						<input class ="form-control" type ="text" id ="txtGame" name ="txtGame">
					</div>
					<div class = "form-group">
						<label for = "txtNickName">Nick Game:</label>
						<input class ="form-control" type ="text" id ="txtNickName" name ="txtNickName">
					</div>
					
					<input class ="button" type ="submit" name ="sbDangKy" id ="sbDangKy" value="DangKy">
					<input class ="button" type ="reset" name ="sbCancel" id ="sbCancel" value="Cancel">
		
			</form>
		</div>
	</body>
	
</html>
