<!DOCTYPE html>
<html lang="vi">
	<head>
		<title>Nhập dữ liệu và hiển thị với prompt và alert</title>
		<meta charset = "ulf-8">
        <link rel="stylesheet" href="../css/stylesheet5.css">
	</head>
	<body>
		<script>
				let name = prompt (" Bí Danh Của Thí Chủ Là Gì ?");
                let yob = Number (prompt (" Năm Sinh Thí Chủ "));
				alert("Xin Chào" + name + ", năm 2026 bạn đã "+ (2026 - yob) +"rồi đó");
                //alert(`Xin Chào ${name} , năm 2026 bạn đã ${(2026 - yob)} rồi đó');
		</script>
	</body>
	
</html>
